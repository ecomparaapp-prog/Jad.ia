kind = "web"
previewPath = "/"
title = "Jad.ia"
version = "1.0.0"

[[services]]
localPort = 5173
name = "web"
paths = ["/"]

[services.env]
PORT = "5173"
BASE_PATH = "/"

[services.development]
run = "pnpm --filter @workspace/jadi-ia run dev"

[services.production]
build = "pnpm --filter @workspace/jadi-ia run build"
serve = "static"
